name: Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Verify (mvn)
    runs-on: ubuntu-latest
    # 使用内置 H2 + test profile，无需外部 MySQL/Redis
    services: {}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: mvn verify (test profile, H2)
        run: mvn -B -q verify
