server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /backend

spring:
  application:
    name: luban-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:luban}?charset=${MYSQL_CHARSET:utf8mb4}&useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      max-lifetime: 600000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.luban.backend.shared.entity

# 支付配置（P-001 计费/订阅闭环）
# mode: mock（内测期，不调真实支付）/ wechat / alipay（未来启用）
payment:
  mode: mock
  mock:
    base-url: ${PAYMENT_MOCK_BASE_URL:https://luban.example.com/mock-pay}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    api-key: ${WECHAT_API_KEY:}
    notify-url: ${WECHAT_NOTIFY_URL:}
  alipay:
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
