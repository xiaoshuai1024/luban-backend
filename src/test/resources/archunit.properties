# ArchUnit freeze 配置（app-deeplink-backend-arch plan T5）
#
# allowStoreCreation=true：新规则首次运行可创建违规 store（冻结当前已知违规）
# allowStoreUpdate=true：DDD 改造期违规集递减时 store 自动同步（store 反映"当前已知违规"）。
#
# 已知权衡（G1 review R1）：allowStoreUpdate=true 意味着新增违规也会被静默吸收进 store，
# 不能在 CI 阻断回归。当前用例下这是接受的——DDD 改造仍在收敛，store 持续缩小；
# 待改造完成（store 为空或稳定）后切到 allowStoreUpdate=false 锁定基线。
# 收紧时机：当 git log 显示 store 文件 30 天无递增改动时，切 false。
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
