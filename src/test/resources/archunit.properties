# ArchUnit freeze 配置（阶段 4 全面硬化）
#
# DDD 改造完成：所有 freeze 已移除，规则硬执行。store 目录已删除。
# allowStoreCreation=false / allowStoreUpdate=false：禁止任何新规则偷冻违规，
# 新增架构违规必在 CI 失败（无静默吸收）。
#
# 如未来确需临时冻结某条规则（如新功能过渡期），手动在规则上加 freeze() 并临时
# 改 allowStoreCreation=true，收敛后立即改回。
freeze.store.default.allowStoreCreation=false
freeze.store.default.allowStoreUpdate=false
